# NOTE (2026-07-02): provider tools added to match the tool_use migration; prompt snapshot now targets the bigMoveTitle/actions schema.
# AI Playbook — does an intake-probe step recover specificity?
# 9 cases: 3 managers × 3 conditions (rich / thin / probed).
# Probed values come from evals/probed-intakes.json (generated by intake-probe.mjs).
# useCases/actions blocks held constant across all conditions so we isolate intake effect.

description: Intake-probe alternative — rich / thin / probed × 3 managers

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 3000
      tools:
        - name: submit_one_page_plan
          description: "Submit the manager's big move. bigMoveTitle is one specific sentence; actions is 4-6 prioritized imperative sentences mixing use cases and change actions."
          input_schema:
            type: object
            required: ["bigMoveTitle", "actions"]
            properties:
              bigMoveTitle: { type: string }
              actions:
                type: array
                minItems: 4
                maxItems: 6
                items: { type: string }
      tool_choice:
        type: tool
        name: submit_one_page_plan

prompts:
  - id: file://prompts/synthesis-generate.txt
    label: synthesis

defaultTest:
  options:
    provider:
      id: anthropic:messages:claude-sonnet-4-6
      config:
        max_tokens: 800
  assert:
    - type: llm-rubric
      threshold: 0.7
      value: |
        Score the synthesis output (a one-page plan) for SPECIFICITY to the input manager.

        Input manager:
        - Role: {{role}}
        - Failure risks: {{failureRisks}}
        - 90-day vision: {{successVision}}

        Score 1-5 on whether the plan is unmistakably tied to THIS manager:
        - 5 = every storyline thesis and thisWeek action ties to specific input details
        - 3 = plan is roughly relevant but contains generic change-management language
        - 1 = could swap names/roles and reuse for anyone

        Also call out any "thinness signals" — phrases that read like the model invented specifics (named tools/time budgets/demographics) not actually in the input.

        Convert: pass_score = score/5. Pass if score >= 3.5 (pass_score >= 0.7).
        Reason: give the 1-5 score, then 1-3 thinness signals if any.

tests:
  # ─── Manager A: Engineering Manager ───────────────────
  - description: "A-rich"
    vars: &A_common
      managerFluency: "Capable"
      teamFluency: "Not yet started"
      useCasesBlock: |
        Content Creation:
          * AI drafts PR descriptions from commit diffs
        Task Automation:
          * Auto-generate weekly status from Jira
      actionsBlock: |
        Start at the End:
          * Spend 90 min using Copilot on a refactor before asking the team
        Make It Safe:
          * 1:1s with the two senior engineers
      role: "Engineering Manager at a 50-person SaaS startup, leads 7 engineers"
      helpWith: "Save time on repetitive tasks, Improve team productivity"
      responsibilities: "Lead a team of 7 engineers, sprint planning, 1:1s, OKRs, code review, hiring"
      failureRisks: "Senior engineers think AI produces bad code and will refuse to use it"
      successVision: "Every engineer using AI for at least one PR per week"

  - description: "A-thin"
    vars:
      <<: *A_common
      role: "Engineering Manager"
      helpWith: "Save time"
      responsibilities: "Manage engineers"
      failureRisks: "People won't use it"
      successVision: "Team uses AI"

  - description: "A-probed"
    vars:
      <<: *A_common
      role: "I'm an Engineering Manager at a mid-size B2B SaaS company, about 400 people total. I manage a team of 6 software engineers, a mix of mid-level and senior. I'm an individual contributor turned manager, about 2 years into the role."
      helpWith: "Honestly, the things that eat my week: writing performance review summaries (I spend way too long phrasing feedback diplomatically), prepping for 1-on-1s when I haven't kept good notes, and status update emails to stakeholders (I end up rewriting the same thing three different ways)."
      responsibilities: "Weekly 1-on-1s with each of my 6 engineers, running sprint planning and retrospectives, writing performance reviews, coordinating dependencies with product, escalating blockers and prioritization calls, onboarding new engineers, representing the team in cross-functional meetings"
      failureRisks: "We rolled out a project management tool last year and half the team just quietly stopped using it after two weeks. What I worry about: I introduce AI tools, people try them once, get a mediocre output, and conclude it's not worth the effort. Especially my senior engineers, they're skeptical and have high standards. If they dismiss it early, that attitude spreads and the whole thing dies without anyone officially saying no."
      successVision: "If you walked into our sprint retro at 90 days, you'd hear engineers referencing something they used AI for that week without me prompting it, like 'I used it to draft the tech spec and then cleaned it up.' In 1-on-1s, people would be bringing it up on their own. And on my end, I wouldn't be staring at a blank page for performance reviews anymore, I'd have a draft I'm editing, not writing from scratch."

  # ─── Manager B: HR Business Partner ───────────────────
  - description: "B-rich"
    vars: &B_common
      managerFluency: "Beginner"
      teamFluency: "Beginner"
      useCasesBlock: |
        Content Creation:
          * AI drafts performance review summaries from quarterly notes
        Data & Insights:
          AI flags bias signals in draft review language
      actionsBlock: |
        Start at the End:
          * Write a 'what does fair review prep look like' standard
        Make It Safe:
          * Establish a legal review checkpoint before AI-drafted feedback ships
      role: "HR Business Partner supporting a 300-person engineering org"
      helpWith: "Save time on repetitive tasks, Standardize quality"
      responsibilities: "Performance reviews, comp planning, ER cases, manager coaching, headcount planning"
      failureRisks: "Bias in AI-assisted decisions and legal exposure on perf reviews"
      successVision: "AI handles 70% of performance review prep work for the eng managers I support"

  - description: "B-thin"
    vars:
      <<: *B_common
      role: "HR Business Partner"
      helpWith: "Standardize quality"
      responsibilities: "HR stuff"
      failureRisks: "Bias"
      successVision: "AI helps with reviews"

  - description: "B-probed"
    vars:
      <<: *B_common
      role: "I'm an HR Business Partner at a mid-sized company, around 800 employees. I support about 4 business units, maybe 200 managers and individual contributors across Sales, Ops, and Engineering. Just me and one other HRBP, so we're stretched thin."
      helpWith: "The performance review cycle kills us. I spend so much time reading manager-written reviews that are either too vague ('meets expectations, good team player') or accidentally say something that could create legal exposure. I also spend a lot of time coaching managers one-on-one to rewrite drafts. Calibration prep takes forever because I'm manually comparing reviews that used totally different language and rating logic."
      responsibilities: "Partnering with business unit leaders on workforce planning, supporting managers through the full performance review cycle including calibration, advising on employee relations cases and PIPs, facilitating talent reviews and succession planning, tracking people metrics like attrition, delivering manager training, ensuring HR policies are applied consistently"
      failureRisks: "Bias is my main concern and I've seen it. Last review cycle a manager gave a woman a lower rating and the feedback focused on her 'communication style' and being 'hard to work with', language we rarely see used on men. I worry that if AI helps write or score reviews, it could learn those patterns from historical data and bake them in at scale. Or managers might rubber-stamp AI suggestions without thinking critically, losing the human check."
      successVision: "If you walked into calibration at 90 days, you'd see managers coming in with reviews that are more consistent, specific examples tied to actual outcomes. I'd want a lightweight checklist or prompt that flags potentially biased language before a review goes to calibration, a coaching tool, not just a gotcha. Fewer last-minute fires, more strategic conversation."

  # ─── Manager C: Marketing Director ───────────────────
  - description: "C-rich"
    vars: &C_common
      managerFluency: "Capable"
      teamFluency: "Beginner"
      useCasesBlock: |
        Content Creation:
          * AI transforms one report into 5 distribution formats
        Strategy & Ideation:
          * AI brainstorms vertical-specific campaign angles for fintech buyers
      actionsBlock: |
        Start at the End:
          * Define what 'creative partner not replacement' means concretely
        Make It Safe:
          * Create Brand Voice Guardrails doc with examples + counter-examples
      role: "Marketing Director at a B2B fintech, 4 direct reports"
      helpWith: "Generate creative ideas faster, Better understand my customers"
      responsibilities: "Brand, demand gen, content calendar, paid acquisition, events, website"
      failureRisks: "Brand voice drift if everyone uses AI differently"
      successVision: "AI is a creative partner for the team, not a replacement, by end of quarter"

  - description: "C-thin"
    vars:
      <<: *C_common
      role: "Marketing Director"
      helpWith: "More ideas"
      responsibilities: "Marketing"
      failureRisks: "Brand drift"
      successVision: "Better content"

  - description: "C-probed"
    vars:
      <<: *C_common
      role: "Marketing Director at a mid-sized B2B SaaS company, around 200-400 employees, Series B or C stage. I lead a team of 5: two content writers, a designer, a demand gen specialist, and a marketing ops person. I report to the CMO."
      helpWith: "The biggest time sinks are brainstorming campaign concepts from scratch (I spend an hour staring at a blank doc trying to come up with angles), writing first drafts of briefs and messaging frameworks, and repurposing content across channels (taking a webinar and turning it into emails, social posts, a blog)."
      responsibilities: "Developing and owning the quarterly marketing plan and campaign calendar, managing and reviewing content output from the team including blogs and landing pages, running weekly team standups and one-on-ones, collaborating with Sales on pipeline goals, overseeing paid and organic channel performance, coordinating product launches, maintaining brand consistency across all external-facing materials"
      failureRisks: "We used AI-generated content at a previous company and after a few months the blog posts all started sounding the same, generic, safe, no real point of view. A partner even asked if we'd changed agencies. What worries me is that if my team leans too hard on AI output without editing, we'll lose the specific tone and personality we've built, the way we use humor, the way we talk about our customers' problems."
      successVision: "If you walked into our weekly content review at 90 days, you'd see the team coming in with 3-4 solid campaign concepts instead of one half-baked idea. They'd be using AI to prep first drafts and research, but the ideas would still feel sharp and on-brand. You'd see us shipping content faster, a blog post and a nurture email out of the same brief in the same week instead of a month later."

outputPath: ./output/intake-probe-results.json
