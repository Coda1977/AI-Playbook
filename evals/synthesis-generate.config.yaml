# AI Playbook — eval for api/synthesis-generate.js
# Forced tool_use (submit_one_page_plan → {bigMoveTitle, actions}). The old
# title/lede/storylines/thisWeek schema this config used to assert was
# replaced in the June 2026 lighter-output release.
# Synced to the prompt in api/synthesis-generate.js (feat/quality-pass).

description: AI Playbook — synthesis-generate (Big Move via tool_use)

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 4096
      tools:
        - name: submit_one_page_plan
          description: "Submit the manager's big move. bigMoveTitle is one specific sentence; actions is 4-6 prioritized imperative sentences mixing use cases and change actions."
          input_schema:
            type: object
            required: ["bigMoveTitle", "actions", "leftOut"]
            properties:
              bigMoveTitle:
                type: string
                description: "8 to 12 word action phrase starting with a verb. One concrete outcome, no narrative."
              actions:
                type: array
                minItems: 4
                maxItems: 6
                items: { type: string }
                description: "4 to 6 prioritized actions (mix of use cases and change actions), each an imperative sentence under 20 words."
              leftOut:
                type: array
                items: { type: string }
                description: "Each starred item you excluded from the move (short quote) plus the reason it serves a different thread than the title. Empty ONLY if every starred item genuinely serves the title's single thread."
      tool_choice:
        type: tool
        name: submit_one_page_plan

prompts:
  - id: file://prompts/synthesis-generate.txt
    label: synthesis-generate

defaultTest:
  assert:
    # 1. Tool output parses with both required keys.
    - type: javascript
      value: |
        let parsed;
        try { parsed = typeof output === "string" ? JSON.parse(output) : output; }
        catch (e) { return { pass: false, score: 0, reason: "Could not parse output as JSON: " + e.message }; }
        const r = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        if (typeof r.bigMoveTitle !== "string" || !r.bigMoveTitle.trim()) return { pass: false, score: 0, reason: "Missing bigMoveTitle" };
        if (!Array.isArray(r.actions)) return { pass: false, score: 0, reason: "Missing actions array" };
        return true;

    # 2. bigMoveTitle: 8-12 words (accept up to 14), starts capitalized, no role mention.
    - type: javascript
      value: |
        const parsed = typeof output === "string" ? JSON.parse(output) : output;
        const r = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        const t = r.bigMoveTitle.trim();
        const wc = t.split(/\s+/).length;
        if (wc < 5 || wc > 14) return { pass: false, score: 0, reason: `bigMoveTitle is ${wc} words (target 8-12): "${t}"` };
        if (!/^[A-Z]/.test(t)) return { pass: false, score: 0, reason: `bigMoveTitle doesn't start capitalized: "${t.slice(0,40)}"` };
        return { pass: true, score: 1, reason: `Title ${wc} words` };

    # 3. actions: 4-6 items, each an imperative sentence under 22 words.
    - type: javascript
      value: |
        const parsed = typeof output === "string" ? JSON.parse(output) : output;
        const r = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        const a = r.actions;
        if (a.length < 4 || a.length > 6) return { pass: false, score: 0, reason: `${a.length} actions (need 4-6)` };
        for (const item of a) {
          if (typeof item !== "string" || item.trim().length < 5) return { pass: false, score: 0, reason: "Action too short" };
          const wc = item.trim().split(/\s+/).length;
          if (wc > 22) return { pass: false, score: 0, reason: `Action over 20 words: "${item.slice(0,50)}..." (${wc}w)` };
          if (!/^[A-Z]/.test(item.trim())) return { pass: false, score: 0, reason: `Action doesn't start capitalized: "${item.slice(0,40)}"` };
        }
        return { pass: true, score: 1, reason: `${a.length} actions, all ≤20ish words` };

    # 4. No em dashes.
    - type: javascript
      value: |
        const parsed = typeof output === "string" ? JSON.parse(output) : output;
        const r = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        const flat = r.bigMoveTitle + " " + (r.actions || []).join(" ");
        const hits = (flat.match(/—/g) || []).length;
        return hits === 0 || { pass: false, score: 0, reason: `${hits} em dash(es)` };

    # 5. No AI parallelism.
    - type: javascript
      value: |
        const parsed = typeof output === "string" ? JSON.parse(output) : output;
        const r = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        const flat = r.bigMoveTitle + " " + (r.actions || []).join(" ");
        const patterns = [/not just .{1,40}, (it'?s|but) /i, /isn'?t .{1,40}, it'?s /i];
        for (const p of patterns) {
          const m = flat.match(p);
          if (m) return { pass: false, score: 0, reason: `AI parallelism: "${m[0]}"` };
        }
        return true;

    # 6. Actions are human moves: never "Build/Create/Set up a system" starts.
    - type: javascript
      value: |
        const parsed = typeof output === "string" ? JSON.parse(output) : output;
        const r = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        const offenders = (r.actions || []).filter(a => /^(build|create|set up)\b/i.test(a.trim()));
        return offenders.length === 0 || { pass: false, score: 0, reason: `Workflow-implementation action starts: ${offenders.map(a => '"' + a.slice(0,50) + '"').join(" | ")}` };

    # 7. No invented deadline in the title (unless input stated one; both tests here don't).
    - type: javascript
      value: |
        const parsed = typeof output === "string" ? JSON.parse(output) : output;
        const r = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        const t = r.bigMoveTitle;
        const deadline = /(by (january|february|march|april|may|june|july|august|september|october|november|december)|within (a|one|two|three|four|five|six|\d+) (week|month|day)|by (the end of|q[1-4])|in \d+ (days|weeks|months))/i;
        const m = t.match(deadline);
        return !m || { pass: false, score: 0, reason: `Title invents a deadline: "${m[0]}"` };

tests:
  - description: "Engineering manager, content+automation focus"
    vars:
      role: "Engineering Manager at a 50-person SaaS startup"
      helpWith: "Save time on repetitive tasks, Improve team productivity"
      responsibilities: "Lead a team of 7 engineers, sprint planning, 1:1s, OKRs, code review, hiring"
      managerFluency: "Capable"
      teamFluency: "Not yet started"
      failureRisks: "Senior engineers think AI produces bad code and will refuse to use it"
      successVision: "Every engineer using AI for at least one PR per week"
      useCasesBlock: |
        Content Creation:
          * Use AI to draft PR descriptions from commit diffs
            Use AI to generate sprint retro summaries from team notes
        Task Automation:
          * Automate weekly status email from Jira tickets
            Auto-generate code review checklists from PR descriptions
        Research & Synthesis:
            Summarize incident postmortems into pattern reports
      actionsBlock: |
        Start at the End:
          * Spend 90 min this week using Copilot on a refactor before asking the team
            Write a one-sentence Definition of Done for "AI-assisted PRs"
        Make It Safe:
          * Have 1:1s with the two senior engineers, name what they might fear losing
            Share your own Copilot mistakes publicly in #engineering
        Script the Steps:
            Pair the strongest skeptic with the keenest enthusiast for a 2-week trial
        Start Small:
            Pilot AI-assisted PRs on one repo before rolling out
        Make Progress Visible:
            Add an "AI assists" line item to weekly engineering update
    assert:
      - type: llm-rubric
        value: |
          The output is a Big Move (bigMoveTitle + 4-6 actions + leftOut) for this engineering manager. Check:
          1. The title names ONE concrete move connected to the starred items (AI-assisted PRs / automated status flow), not a vague "adopt AI" statement, and does not mention the manager's role.
          2. Every STARRED item (marked *) lands in exactly one place: in the actions if it serves the title's thread, or in leftOut with a reason if it serves a different thread (e.g., the status-email automation may legitimately be left out of a PR-focused move). Fail only if a starred item vanishes from both, or if actions mix two unrelated threads.
          3. Action #1 is something the manager could literally do tomorrow.
          4. Original wording from starred items is recognizably preserved (tightened is fine).
          Fail if the move reads like a generic "engineering manager + AI" template or ignores the starred items.

  - description: "Marketing director with thin intake"
    vars:
      role: "Marketing Director, B2B fintech"
      helpWith: "Generate creative ideas faster"
      responsibilities: "Brand, demand gen, content calendar"
      managerFluency: "Capable"
      teamFluency: "Beginner"
      failureRisks: "Brand voice drift if everyone uses AI differently"
      successVision: "AI is a creative partner, not a replacement"
      useCasesBlock: |
        Content Creation:
          * Repurpose top blogs into vertical-specific variants
        Strategy & Ideation:
          * Brainstorm campaign angles with AI as junior strategist
      actionsBlock: |
        Make It Safe:
          * Create a "Brand Voice Guardrails" doc before scaling AI content
        Script the Steps:
          * Build a shared prompt library for the team
    assert:
      - type: llm-rubric
        value: |
          With thin inputs:
          1. The actions should NOT invent items that weren't provided; every action must trace to one of the 4 starred inputs (tightened wording is fine).
          2. The move should center on controlled creative scaling (guardrails + prompt library + repurposing), reflecting the brand-voice-drift risk.
          3. No fabricated metrics, experiences, or deadlines anywhere.
          Fail if the plan fabricates use cases/actions that weren't in the input.

  - description: "Sales director — starred items span two threads; move must pick one and leftOut the other"
    vars:
      role: "Director of Sales at a 300-person SaaS company, leading 18 AEs and SDRs"
      helpWith: "Save time on repetitive work, Make better decisions with data"
      responsibilities: "Pipeline reviews, forecast calls, deal coaching, discovery call quality, proposal reviews, quota planning"
      managerFluency: "Capable"
      teamFluency: "Not yet started"
      failureRisks: "Top AEs guard their discovery craft; AI-sounding outreach would make them rebel"
      successVision: "Every rep walks into discovery with an AI-prepped account brief, and forecast calls run on evidence instead of gut feel"
      useCasesBlock: |
        Research & Synthesis:
          * Query an assistant preloaded with an account's 10-K, press releases, and pain themes to generate a discovery brief
        Data & Insights:
          * Paste the current pipeline snapshot into chat and extract at-risk deals by coverage ratio and stage age
          * Score forecast call submissions against historical close rates to flag sandbagged versus overstated commits
      actionsBlock: |
        Start at the End:
          * Run the AI account brief workflow yourself on one live account before Tuesday's pipeline review
        Start Small:
          * Select two volunteer reps for a two-week pilot running the AI brief workflow on every booked discovery call
        Make Progress Visible:
          * Ask one pilot rep at each Monday forecast call to share what the AI brief surfaced that they would have missed
    assert:
      - type: llm-rubric
        value: |
          The starred items span TWO distinct threads: (a) AI-prepped discovery briefs (assistant brief, run-it-yourself, two-rep pilot, pilot rep share-outs) and (b) forecast-call evidence (pipeline risk extraction, commit scoring). A coherent Big Move picks ONE thread.
          1. The title names one thread, not both.
          2. Every action serves the titled thread. Fail if any action belongs to the other thread (e.g., a forecast-scoring action inside a discovery-brief move).
          3. The leftOut field explicitly lists the other thread's starred items with a reason. Fail if leftOut is empty while actions silently include or drop the second thread.
          4. Every action is a human move: it starts with something a person does (query, paste, run, ask, select, share). An action like "Query an assistant preloaded with an account's 10-K to generate the brief" counts as a human move; only fail actions with no human actor at all ("Build a system that...", "A workflow generates...").

outputPath: ./output/synthesis-generate-results.json
