# NOTE (2026-07-02): provider tools added to match the tool_use migration; the full prompt snapshot now redistributes 12 ideas 1-3 per category.
# AI Playbook — A/B test: full primitives prompt vs minimal baseline.
# Same test cases run against both prompts. Dashboard shows side-by-side.

description: Idea quality A/B — full prompt vs minimal baseline

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 2048
      tools:
        - name: submit_use_cases
          description: "Submit the personalized AI use cases. Each field is an array of 1 to 3 idea sentences (12 ideas total across all fields), each 15 to 20 words, each starting with a verb."
          input_schema:
            type: object
            required: ["content", "automation", "research", "data", "coding", "ideation"]
            properties:
              content: { type: array, minItems: 1, maxItems: 3, items: { type: string } }
              automation: { type: array, minItems: 1, maxItems: 3, items: { type: string } }
              research: { type: array, minItems: 1, maxItems: 3, items: { type: string } }
              data: { type: array, minItems: 1, maxItems: 3, items: { type: string } }
              coding: { type: array, minItems: 1, maxItems: 3, items: { type: string } }
              ideation: { type: array, minItems: 1, maxItems: 3, items: { type: string } }
      tool_choice:
        type: tool
        name: submit_use_cases

prompts:
  - id: file://prompts/primitives-generate.txt
    label: full-prompt
  - id: file://prompts/primitives-baseline.txt
    label: baseline-prompt

defaultTest:
  options:
    provider:
      id: anthropic:messages:claude-sonnet-4-6
      config:
        max_tokens: 800
  assert:
    - type: llm-rubric
      threshold: 0.76  # corresponds to average ~3.8/5 (3.8/5 = 0.76)
      value: |
        Score the AI use case ideas (the JSON in the output) against this manager's situation:
        - Role: {{role}}
        - Responsibilities: {{responsibilities}}
        - What they want help with: {{helpWith}}
        - Failure risks: {{failureRisks}}
        - 90-day vision: {{successVision}}

        Judge the SET OF IDEAS as a whole on three criteria, each scored 1-5, then convert the AVERAGE to a 0-1 score (avg/5).

        ACTIONABILITY (1-5): Could the manager do these in the next 7 days without confusion? 1 = aspirational ("Leverage AI to..."), 5 = they know exactly what to click on Monday.
        SPECIFICITY (1-5): Do the ideas reference details only THIS manager would have? 1 = copy-pasteable to anyone in their function, 5 = unmistakably this manager.
        IMPACT (1-5): Would doing these plausibly move them toward their 90-day vision? 1 = irrelevant, 5 = directly advances it.

        Pass = avg/5 >= 0.76 (i.e., average >= 3.8/5).
        In your reason, give the per-criterion scores and the computed average.

tests:
  - description: "Engineering Manager"
    vars:
      role: "Engineering Manager at a 50-person SaaS startup, leads 7 engineers"
      helpWith: "Save time on repetitive tasks, Improve team productivity"
      responsibilities: "Lead a team of 7 engineers, sprint planning, 1:1s, OKRs, code review, hiring"
      failureRisks: "Senior engineers think AI produces bad code and will refuse to use it"
      successVision: "Every engineer using AI for at least one PR per week"

  - description: "HR Business Partner"
    vars:
      role: "HR Business Partner supporting a 300-person engineering org"
      helpWith: "Save time on repetitive tasks, Standardize quality"
      responsibilities: "Performance reviews, comp planning, ER cases, manager coaching, headcount planning"
      failureRisks: "Bias in AI-assisted decisions and legal exposure on perf reviews"
      successVision: "AI handles 70% of performance review prep work for the eng managers I support"

  - description: "Marketing Director"
    vars:
      role: "Marketing Director at a B2B fintech, 4 direct reports"
      helpWith: "Generate creative ideas faster, Better understand my customers"
      responsibilities: "Brand, demand gen, content calendar, paid acquisition, events, website"
      failureRisks: "Brand voice drift if everyone uses AI differently"
      successVision: "AI is a creative partner for the team, not a replacement, by end of quarter"

outputPath: ./output/idea-quality-ab-results.json
