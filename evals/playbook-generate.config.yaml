# AI Playbook — eval for api/playbook-generate.js
# Uses tool_use (forced) for structured output. 2 actions per rule, 3 on the
# one or two rules the intake signals prioritize (11-12 total).
# Synced to the prompt in api/playbook-generate.js (feat/quality-pass).

description: AI Playbook — playbook-generate (change strategy via tool_use)

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 4096
      tools:
        - name: submit_change_plan
          description: "Submit the personalized change strategy. prioritizedRules names the 1-2 rules that get a third action; every other rule gets exactly 2 actions (11-12 total). Each action is under 25 words and starts with a concrete verb."
          input_schema:
            type: object
            required: ["prioritizedRules", "destination", "safe", "script", "small", "visible"]
            properties:
              prioritizedRules:
                type: array
                minItems: 1
                maxItems: 2
                items: { type: string, enum: ["destination", "safe", "script", "small", "visible"] }
                description: "The one or two rule ids the context signals prioritize. Only these rules get a third action."
              destination:
                type: array
                minItems: 2
                maxItems: 3
                items: { type: string }
                description: "Rule 1: Start at the End"
              safe:
                type: array
                minItems: 2
                maxItems: 3
                items: { type: string }
                description: "Rule 2: Make It Safe"
              script:
                type: array
                minItems: 2
                maxItems: 3
                items: { type: string }
                description: "Rule 3: Script the Steps"
              small:
                type: array
                minItems: 2
                maxItems: 3
                items: { type: string }
                description: "Rule 4: Start Small, to go Big"
              visible:
                type: array
                minItems: 2
                maxItems: 3
                items: { type: string }
                description: "Rule 5: Make Progress Visible"
      tool_choice:
        type: tool
        name: submit_change_plan

prompts:
  - id: file://prompts/playbook-generate.txt
    label: playbook-generate

defaultTest:
  assert:
    # Helper: extract the plan from tool_use wrapper.
    # 1. Extract & parse the plan JSON.
    - type: javascript
      value: |
        let parsed;
        try { parsed = typeof output === "string" ? JSON.parse(output) : output; }
        catch (e) { return { pass: false, score: 0, reason: "Could not parse output as JSON: " + e.message }; }
        const plan = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        const required = ["destination", "safe", "script", "small", "visible"];
        const missing = required.filter(k => !Array.isArray(plan[k]));
        if (missing.length) return { pass: false, score: 0, reason: `Missing rule keys: ${missing.join(", ")}` };
        for (const k of required) {
          const a = plan[k];
          // Under-generation is a real failure; over-generation is trimmed
          // server-side (api/playbook-generate.js caps at 2, or 3 if prioritized).
          if (a.length < 2) return { pass: false, score: 0, reason: `${k} has ${a.length} actions (need at least 2)` };
        }
        return { pass: true, score: 1, reason: "All 5 rules present with 2+ actions" };

    # 1b. Prioritization survives the server trim. api/playbook-generate.js
    # deterministically caps every rule at 2 actions (3 for the 1-2 rules in
    # prioritizedRules), so we assert on the post-trim shape users receive.
    - type: javascript
      value: |
        const parsed = typeof output === "string" ? JSON.parse(output) : output;
        const plan = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        const ruleKeys = ["destination", "safe", "script", "small", "visible"];
        const pri = Array.isArray(plan.prioritizedRules) ? plan.prioritizedRules.slice(0, 2) : [];
        if (pri.length < 1) return { pass: false, score: 0, reason: "Model did not commit to prioritizedRules" };
        const trimmed = ruleKeys.map(k => Math.min((plan[k] || []).length, pri.includes(k) ? 3 : 2));
        const total = trimmed.reduce((s, n) => s + n, 0);
        const threes = trimmed.filter(n => n === 3).length;
        if (total < 10 || total > 12) return { pass: false, score: 0, reason: `${total} actions after server trim (need 10-12; per-rule: ${trimmed.join(",")})` };
        if (threes < 1) return { pass: false, score: 0, reason: `No rule kept 3 actions after trim — prioritization invisible (prioritized: ${pri.join(",")})` };
        return { pass: true, score: 1, reason: `${total} actions after trim, prioritized: ${pri.join(",")}` };

    # 2. Each action <25 words (project rule).
    - type: javascript
      value: |
        const parsed = typeof output === "string" ? JSON.parse(output) : output;
        const plan = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        const offenders = [];
        let wayOver = false;
        for (const [rule, actions] of Object.entries(plan)) {
          if (rule === "prioritizedRules" || !Array.isArray(actions)) continue;
          for (const a of actions) {
            const wc = a.trim().split(/\s+/).length;
            // Target 25; the model estimates rather than counts, and actions
            // with embedded quoted scripts legitimately run a few words long
            // (scripts are the highest-value actions; allow them 33).
            const cap = /["'‘’“”]/.test(a) ? 33 : 30;
            if (wc > cap) offenders.push(`${rule}: "${a.slice(0,60)}..." (${wc}w, cap ${cap})`);
            if (wc > 35) wayOver = true;
          }
        }
        // A single straggler 1-2 words over is model-stochastic noise, not
        // verbosity drift; fail on 2+ offenders or any action past 35 words.
        return (offenders.length < 2 && !wayOver) || { pass: false, score: 0, reason: `Actions over 25-word target: ${offenders.join(" | ")}` };

    # 3. Each action starts with a concrete verb (not "consider," "think about," "explore the idea of").
    - type: javascript
      value: |
        const parsed = typeof output === "string" ? JSON.parse(output) : output;
        const plan = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        const bannedStarts = [/^consider\b/i, /^think about\b/i, /^explore the idea\b/i, /^try to\b/i, /^maybe\b/i];
        const offenders = [];
        for (const [rule, actions] of Object.entries(plan)) {
          if (rule === "prioritizedRules" || !Array.isArray(actions)) continue;
          for (const a of actions) {
            const first = a.trim().split(/\s+/)[0] || "";
            if (!/^[A-Z][a-z]+/.test(first)) offenders.push(`${rule}: doesn't start with capitalized verb: "${a.slice(0,40)}"`);
            for (const p of bannedStarts) {
              if (p.test(a.trim())) offenders.push(`${rule}: weak start: "${a.slice(0,40)}"`);
            }
          }
        }
        return offenders.length === 0 || { pass: false, score: 0, reason: offenders.join(" | ") };

    # 4. No em dashes.
    - type: javascript
      value: |
        const parsed = typeof output === "string" ? JSON.parse(output) : output;
        const plan = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        const flat = JSON.stringify(plan);
        const hits = (flat.match(/—/g) || []).length;
        return hits === 0 || { pass: false, score: 0, reason: `Found ${hits} em dash(es)` };

    # 5. No "not just X, it's Y" / "isn't X, it's Y" parallelism.
    - type: javascript
      value: |
        const parsed = typeof output === "string" ? JSON.parse(output) : output;
        const plan = (parsed && parsed.type === "tool_use" && parsed.input) ? parsed.input : parsed;
        const flat = JSON.stringify(plan);
        const patterns = [/not just .{1,40}, (it'?s|but) /i, /isn'?t .{1,40}, it'?s /i];
        for (const p of patterns) {
          const m = flat.match(p);
          if (m) return { pass: false, score: 0, reason: `AI parallelism: "${m[0]}"` };
        }
        return true;

    # 6. Move-palette value lens: judge leverage per intent, never the mix of shapes.
    - type: llm-rubric
      value: |
        Judge the LEVERAGE of each action's chosen move, not the mix of move types:
        1. Levers are operationalized. An action fails this only when it has NO concrete operational content: no named person or group, no artifact, no venue, no script, no metric (e.g. "communicate more", "create psychological safety", "encourage experimentation"). The methodology's own moves ARE operational when they name their subject: a leader demo of the manager's own messy AI attempt, a 1:1 naming what a specific person stands to lose, a template or checklist change, a pilot with entry criteria, a recurring share-out rhythm.
        2. Defaults beat broadcasts for Rules 3-5 (script/small/visible, where the intent is installing behavior): flag a STEP-FREE announcement, vision email, or reminder there if a default, template, checklist, or ownership change could carry the same intent with higher behavior-change probability. A specific scripted instruction (one artifact, one step, do it this week) is the script rule's signature move, not a broadcast; never flag it. Rules 1-2 legitimately live in conversation, story, and meetings; do not flag those.
        3. Stock moves are fit-checked: flag a move only when the profile CONTRADICTS its ingredient, e.g. "learn from the person who already uses AI" on a team explicitly described as not yet started, or a venue (offsite, lunch-and-learn series) the profile never mentions used as a linchpin. Asking who is most open to trying, or recruiting the most willing person, is a valid move, not an assumed ingredient.
        4. Change moves, not workflow implementation: flag any action whose real content is building, configuring, or operating the AI workflow itself (building prompt templates, setting up tools, the manager running the use case as a task). The human move around the workflow is what belongs here: assigning someone to try it, scripting the team's first attempt, reviewing the output together, changing the default that embeds it.
        Do NOT reward or penalize the mix of move types itself, and do NOT count how many actions mention the same workflow; judge only whether each intent got the highest-leverage move available.
        Fail if two or more actions have no operational content, or if a Rules 3-5 broadcast displaced an obvious default-change, or if a stock move contradicts the profile, or if two or more actions are workflow implementation rather than change moves.

tests:
  - description: "Not-yet-started manager + team, low fluency"
    vars:
      role: "Engineering Manager at a 50-person SaaS startup, leads 7 engineers"
      responsibilities: "Sprint planning, 1:1s, OKRs, code review, hiring and onboarding"
      helpWith: "Save time on repetitive work, Improve the quality of what I produce"
      managerFluency: "Not yet started"
      teamFluency: "Not yet started"
      failureRisks: "Senior engineers think AI tools produce bad code and will refuse to use them"
      successVision: "By 90 days, every engineer has used AI for at least one PR per week"
      starredBlock: "(none yet)"
    assert:
      - type: llm-rubric
        value: |
          Given the manager has "Not yet started" AI fluency, Rule 1 (destination) actions MUST include
          the manager trying AI themselves before asking the team (any concrete first-use action counts).
          Given failure risk = senior engineer resistance, Rule 2 (safe) must engage the senior engineers'
          stake CONCRETELY through at least one of: probing or naming what they stand to lose (expertise,
          identity, reputation, or "what feels at risk"), legitimizing their skepticism before pitching
          benefits, direct 1:1 conversations with the skeptics, or a no-consequences practice space.
          Fail if Rule 1 misses the manager-goes-first action, or if Rule 2 is generic "create psychological
          safety" advice with none of the concrete senior-engineer moves above.

  - description: "Capable manager + Not-yet-started team, mid-size company"
    vars:
      role: "Director of Customer Success at a 200-person SaaS, leads 15 CSMs"
      responsibilities: "Customer health monitoring, escalations, QBRs, renewals forecasting, CS team training"
      helpWith: "Save time on repetitive work, Scale my impact beyond my capacity"
      managerFluency: "Capable, uses AI daily for prep and writing"
      teamFluency: "Not yet started"
      failureRisks: "Previous CRM rollout failed because CSMs felt forced and disengaged"
      successVision: "AI summarizes call notes and drafts QBR slides automatically by end of quarter"
      starredBlock: "- Research & Synthesis: AI summarizes 30-min customer calls into key takeaways and action items\n- Content Creation: AI drafts QBR slide narratives from account health data"
    assert:
      - type: llm-rubric
        value: |
          Note: the output contract caps every rule at 2 actions (3 for at most two prioritized rules), so judge quality within that budget, not by volume. Plan should:
          1. Reference the starred use cases (AI call summaries and/or QBR drafts) concretely somewhere in the plan, as actual starting points rather than vague mentions.
          2. Address the previous failed rollout via Rule 4 (Start Small) — pilot with 1-2 willing CSMs, NOT mandate to all 15.
          3. Rule 5 (visible) actions commit to a recurring communication rhythm (not a one-off announcement), given the past failure.
          4. Anchor placement: Rule 2 (safe) stays about people and fears, not workflow mechanics; Rule 1 (destination) names the pilot workflow in at most one action. Do NOT fail the plan for how many Rule 3-5 actions center on the pilot workflow: the one-pilot chain (script it, pilot it, expand it, review it, share it) is the methodology working as designed.
          Fail if starred items aren't referenced anywhere, OR the plan ignores the previous-failure context, OR Rule 2 contains workflow mechanics instead of people work.

  - description: "OD director — transformative starred use case must route to Rule 1 + Rule 4"
    vars:
      role: "Director of Organizational Development at a 400-person SaaS, leads 5 L&D partners"
      responsibilities: "Leadership programs, manager training curricula, org design projects, engagement surveys, executive coaching"
      helpWith: "Improve the quality of what I produce, Take on things I can't do today"
      managerFluency: "Capable, uses AI for program design and synthesis"
      teamFluency: "Capable, facilitators use AI individually for materials"
      failureRisks: "Facilitators fear AI-generated content will make programs feel generic and undercut their craft"
      successVision: "Program design cycles run twice as fast and managers keep practicing between sessions instead of forgetting everything"
      starredBlock: "- Strategy & Ideation: Replace the post-program survey with an always-on AI assistant managers query between sessions, starting with one cohort\n- Content Creation: Draft first-version workshop facilitation guides from program outlines and past session feedback"
    assert:
      - type: llm-rubric
        value: |
          The starred "always-on AI assistant between sessions" use case is TRANSFORMATIVE: it replaces a deliverable and changes how the work happens. Check the routing:
          1. Rule 1 (destination) treats it as destination material: at least one action paints the concrete after-state built around it.
          2. Rule 4 (small) pilots its first small probe (one cohort or one program), not a full rollout.
          3. It is NOT scattered across all five rules; Rule 2 (safe) stays about the facilitators as people.
          4. The facilitators' craft fear is engaged concretely in Rule 2 (what they personally stand to lose), not with generic reassurance.
          Fail if the transformative starred item is absent from Rule 1, or piloted nowhere, or appears in more than 4 actions, or if Rule 2 never touches the craft fear.

  - description: "Transformative manager + Capable team, ambitious vision"
    vars:
      role: "VP of Product at a 500-person SaaS, leads 4 PM directors"
      responsibilities: "Product strategy, roadmap reviews, PM coaching, exec alignment, launch oversight"
      helpWith: "Take on things I can't do today, Make better decisions with data"
      managerFluency: "Transformative, has built AI products and shipped agents"
      teamFluency: "Capable, most PMs use AI for specs and analysis"
      failureRisks: "PMs may use AI as a crutch and stop developing strategic judgment"
      successVision: "AI is embedded in every PM workflow, from discovery to launch metrics"
      starredBlock: "(none yet)"
    assert:
      - type: llm-rubric
        value: |
          Given high fluency on both sides:
          1. Rule 1 (destination) should focus on raising the bar / new capabilities, NOT basic AI introduction.
          2. Rule 2 (safe) should address the failure risk: protecting strategic judgment, NOT generic "fear of failure."
          3. Rule 3-5 should match the ambitious vision (embedded everywhere) with concrete scripts and metrics.
          Fail if actions are remedial (e.g., "schedule an AI 101 training") for a clearly advanced team.

  - description: "Internal coach — client-serving starred pilot must not turn clients into the change audience"
    vars:
      role: "Internal Executive Coach at a 600-person SaaS company, coaching 30 senior leaders alongside two fellow internal coaches"
      responsibilities: "One-on-one executive coaching sessions, 360 feedback debriefs, leadership assessments, development plans, offsite facilitation, growing the internal coaching program"
      helpWith: "Improve the quality of what I produce, Scale my impact beyond my capacity"
      managerFluency: "Capable, uses AI purposefully for specific tasks"
      teamFluency: "Capable, the other coaches use AI individually and inconsistently"
      failureRisks: "Coaching lives on confidentiality; if leaders suspect their session content touches an AI tool, candor dies instantly. My two fellow coaches also see AI-drafted development feedback as impersonal and beneath the craft"
      successVision: "Every leader practices between sessions with structured reflection, and we coach twice as many leaders without losing depth"
      starredBlock: "- Content Creation: Invert development plan authorship by having each leader draft their own plan in AI, then you refine and coach against it\n- Research & Synthesis: Query AI with anonymized leadership challenge patterns to surface relevant research for your debriefs"
    assert:
      - type: llm-rubric
        value: |
          The manager's "team" is the two fellow internal coaches. The 30 coached leaders are CLIENTS, and the starred pilot's users are those clients. Check the change audience:
          1. Rule 2 (safe) actions engage the fellow coaches (craft fear, confidentiality red line), never the coached leaders.
          2. No action manages a client's feelings, first steps, or adoption (e.g., "script a leader's first step", "share the vision with all 30 leaders"). A single leader may appear only as the Rule 4 pilot's scope (e.g., "pilot the inverted plan workflow with one leader").
          3. Actions script the COACHES' behavior in the new way of working (how a coach runs the new session format, what the coaches review together), not the leaders' behavior.
          4. Confidentiality is treated as a hard constraint somewhere in the plan.
          Fail if two or more actions treat coached leaders as the change audience, or if Rule 2 is aimed at clients instead of the fellow coaches.

outputPath: ./output/playbook-generate-results.json
